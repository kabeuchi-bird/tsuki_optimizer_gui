# tsuki_optimize.toml
# 全てのフィールドはオプションです。省略した場合はデフォルト値が使われます。
# このファイルをそのまま使う場合はすべてデフォルト値での動作になります。

# ──────────────────────────────────────
# [run] 実行パラメータ
# ──────────────────────────────────────
[run]

# コーパスファイルのパス（コマンドライン引数で上書き可）
corpus = "corpus.txt"

# キーボードサイズ: "3x10"（デフォルト）または "3x11"
# 3x10: 。と、がDキー/Kキー固定、Layer 1に30スロット×2（計60スロット）
# 3x11: 右端に1列追加（計66スロット）、☆★がシフトキー専用、固定文字なし
# keyboard_size = "3x10"

# 乱数シード（再現性のある結果を得たい場合に設定）
# 未指定の場合はOS乱数から自動生成される。再実行時に同じ結果を得たければ
# ログに出力されたシード値をここに記入する。
# seed = 42

# タブーサーチの最大イテレーション数
max_iter = 50000

# この回数改善がなければ再起動する
restart_after = 3000

# 再起動の最大回数
max_restarts = 10

# Layer 1 内スワップのタブーリスト長（テニュア）
tabu_l1 = 15

# Layer 2 内スワップのタブーリスト長
tabu_l2 = 15

# 層間スワップのタブーリスト長（影響が大きいため長めに）
tabu_inter = 25

# 層間スワップ候補のサンプリング数
# 大きくすると探索品質が上がるが速度が落ちる
inter_sample = 80

# 同レイヤー内スワップで全ペアを列挙する上限
# ペア数がこれを超えたらランダムサンプリングに切り替える
ab_sample_limit = 200

# 進捗ログの出力間隔（イテレーション数）
log_interval = 1000

# 再起動時に行うランダム層間スワップ（L1↔L2）の回数
# 大きくすると局所最適から抜け出しやすくなるが、再起動後の初期品質が下がる
perturbation_swaps = 8

# ── 可動テニュア設定 ─────────────────────────────────────────────
# no_improve がこの割合（× restart_after）を超えたらテニュア増加を開始する
# 例: restart_after=3000, tenure_grow_threshold=0.5 → 1500回改善なしで増加開始
tenure_grow_threshold = 0.5

# テニュア増加のインターバル（イテレーション数）
# 閾値超過後、この間隔ごとに自動算出したステップ量ずつ増加する
# （再起動寸前にちょうど上限に達するよう tenure_step を自動計算）
tenure_grow_interval = 200

# テニュアの上限倍率（初期値 × この値を超えない）
# 例: tabu_l1=15, tenure_max_scale=3.0 → 最大45まで増加
tenure_max_scale = 3.0


# ──────────────────────────────────────
# [weights] ペナルティ／ボーナス値
# ──────────────────────────────────────
[weights]

# 打鍵数コストのスケール係数
# 「L1/L2どちらに置くか」を最優先にするため、他の評価より大きく設定する。
# stroke_scale >> slot_difficulty の最大差 を保つこと。
stroke_scale = 10.0

# ペナルティ（正の値 → スコアを悪化させる）
# ----------------------------------------------------------------
# 同じ物理キーを連続して打鍵するペナルティ
# L1同士: 同じ文字の連続（例: ああ → あ あ）
# L2→L1: L2文字の直後に同じ物理キーのL1文字を打つ場合も対象（文字が異なっても発生）
# ※ L1→L2 の場合は L2 の最初の打鍵がシフトキーのため対象外
same_key_penalty = 8.0

# 同じ指で異なるキーを続けて打鍵するペナルティ（例: か行→た行 を中指だけで）
same_finger_penalty = 5.0

# 同手で上段↔下段を跨ぐ打鍵のペナルティ（row差が2のとき）
upper_lower_jump = 1.5

# 同手・異なる指での基礎コスト
# （アウトロール・インロールボーナスはここから差し引かれる）
same_hand_base = 0.2

# ボーナス（スコアから差し引く値。大きいほど優遇）
# 優先順位: alternation_bonus > outroll_bonus > inroll_bonus
# ----------------------------------------------------------------
# 左右交互打鍵ボーナス
alternation_bonus = 0.6

# アウトロール（打鍵方向が小指側へ向かう）ボーナス
# 例: 左手なら人差し指→中指→薬指→小指の方向
outroll_bonus = 0.4

# インロール（打鍵方向が人差し指側へ向かう）ボーナス
inroll_bonus = 0.15

# 準交互打鍵ボーナス（trigram単位）
# LLR / RRL / LRR / RLL のような「2打を1アクションとみた交互打鍵」を評価する
quasi_alt_bonus = 0.1


# ──────────────────────────────────────
# [slot_difficulty] スロット難易度テーブル
#
# 各行（row）を配列で指定する。
#   3x10: 10要素、3x11: 11要素
# 値が小さいほど打ちやすいスロット。
#
# 列の対応（3x10）:
#   [左小指, 左薬指, 左中指(Dキー), 左人差し指, 左人差し指,
#    右人差し指, 右人差し指, 右中指(Kキー), 右薬指, 右小指]
#
# 列の対応（3x11）:
#   [左小指, 左薬指, 左中指(☆), 左人差し指, 左人差し指,
#    右人差し指, 右人差し指, 右中指(★), 右薬指, 右小指, 右小指(追加列)]
# ──────────────────────────────────────
[slot_difficulty]

# 上段（Qキー行）
#           左小   左薬   左中   左人   左人   右人   右人   右中   右薬   右小
row0 = [    1.8,   1.4,   1.2,   1.1,   1.4,   1.4,   1.1,   1.2,   1.4,   1.8 ]

# 中段ホーム（Aキー行）← 最も打ちやすい行
#           左小   左薬   左中   左人   左人   右人   右人   右中   右薬   右小
row1 = [    1.3,   1.0,   0.9,   0.9,   1.1,   1.1,   0.9,   0.9,   1.0,   1.3 ]

# 下段（Zキー行）
#           左小   左薬   左中   左人   左人   右人   右人   右中   右薬   右小
row2 = [    1.9,   1.5,   1.3,   1.2,   1.6,   1.6,   1.2,   1.3,   1.5,   1.9 ]


# ──────────────────────────────────────
# [[constraints.exclusive_pairs]] 排他配置ペア（複数設定可）
#
# 同一物理キー（同じ行・列のスロット）のL1とL2に、
# GroupAとGroupBのかなを同時に配置することを禁止する。
# L1にGroupAの文字があればL2にGroupBは置けない（対称）。
#
# 使用例：拗音（ゃゅょ）と拗音を形成する基音（きしちにひみり）を
# 同じ物理キーのL1/L2に共存させない。
# （例: L1に「き」があるキーのL2に「ゃ」は置けない）
#
# [[constraints.exclusive_pairs]]
# group_a = "ゃゅょ"        # 拗音
# group_b = "きしちにひみり" # 拗音と組み合わせる基音
# ──────────────────────────────────────
