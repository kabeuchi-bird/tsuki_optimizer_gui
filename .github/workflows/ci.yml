name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tsuki-optimizer-linux-x86_64
            bin_suffix: ""
          - os: windows-latest
            artifact_name: tsuki-optimizer-windows-x86_64
            bin_suffix: ".exe"
          - os: macos-latest
            artifact_name: tsuki-optimizer-macos-arm64
            bin_suffix: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Check clippy
        run: cargo clippy -- -D warnings

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/tsuki_optimize${{ matrix.bin_suffix }} dist/
          cp target/release/gui${{ matrix.bin_suffix }} dist/
          cp config.toml dist/
          cp README.md dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
