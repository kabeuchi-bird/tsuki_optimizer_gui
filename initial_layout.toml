# initial_layout.toml — ユーザー定義初期配列
#
# config.toml の initial_layout = "user-defined" と組み合わせて使用します。
# GUI では初期配列プルダウンで「ユーザー定義」を選択すると読み込まれます。
#
# 【記述ルール】
#   layer1 / layer2 を各3行の文字列（配列）で記述してください。
#   各行の文字数はキーボードサイズに合わせる必要があります:
#     3x10: 各行10文字
#     3x11: 各行11文字
#
#   3x11 の Layer 1 では、専用シフトキー位置（row1の col2 と col7）に
#   任意のプレースホルダー（☆ ★ や - など）を書いてください。
#   その位置に書かれた文字は無視され、シフトキーとして扱われます。
#
#   未使用スロット（3x11のみ）には □ を記入してください。
#
#   このファイルが存在しない・形式が不正な場合は、
#   ログに警告が記録されランダム配字にフォールバックします。
#
# 【文字の制約】
#   - 全文字を1度ずつ過不足なく記述してください
#   - 3x10: 60文字（Layer1: 30文字, Layer2: 30文字）
#   - 3x11: 64文字（Layer1: 31文字+☆★, Layer2: 33文字、□は合計2個・配置レイヤーは任意）
# ──────────────────────────────────────────────────────────────────────

# ── 3x10 キーボード ───────────────────────────────────────────────────
# 【注意】3x10 では 「、」(Dキー位置: row1 col2) と「。」(Kキー位置: row1 col7) は
# 最適化プロセス中に移動しない固定文字です。
# ここでの配字位置がそのまま最終結果になります。
# （3x11 ではこの制約はなく、「、」「。」も自由に最適化されます）
[layout_3x10]
layer1 = [
  "そこしてょつんいのり",
  "はか、とたくう。゛き",
  "すけになさっるちれ゜"
]
layer2 = [
  "ぁひほふめぬえみやぇ",
  "ぃをらあよまおもわゆ",
  "ぅへせゅゃむろねーぉ"
]

# ── 3x11 キーボード ───────────────────────────────────────────────────
# 月配列2-263 3x11版 初期配列
# ☆ = 左シフトキー（row1 col2）、★ = 右シフトキー（row1 col7）
# □ = 未使用スロット
[layout_3x11]
layer1 = [
  "そこしてょつんいのりち",
  "はか☆とたくう★゛きれ",
  "すけになさっる、。゜□"
]
layer2 = [
  "ぁひほふめぬえみやぇ「",
  "ぃをらあよまおもわゆ」",
  "ぅへせゅゃむろねーぉ□"
]
