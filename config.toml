# config.toml — tsuki_optimize 設定ファイル
#
# 全フィールドは省略可能で、省略するとデフォルト値が使われます。
# このまま使えばすべてデフォルト動作になります。
# 設定の優先順位（高→低）: CLIオプション > このファイル > デフォルト値


# ══════════════════════════════════════
# [run] 実行パラメータ
# ══════════════════════════════════════
[run]

# コーパスファイルのパス（CLIの --corpus で上書き可）
corpus = "corpus.txt"

# キーボードサイズ: "3x10"（デフォルト）/ "3x11"
#   3x10: D/Kキーに「、」「。」固定、Layer 1 は30スロット
#   3x11: 右端に1列追加、☆★がシフトキー専用、固定文字なし
# keyboard_size = "3x10"

# 初期配列モード: "2-263"（デフォルト）/ "random" / "user-defined"
#   2-263:        月配列2-263をベースに、頻出文字をLayer 1へ寄せた決定的な初期解
#   random:       制約を守って全文字をランダム配置（seed で再現可）
#   user-defined: initial_layout.toml の配列を使用（読み込み失敗時は random にフォールバック）
# initial_layout = "2-263"

# 乱数シード（再現性が欲しい場合に指定）
# 未指定ならOS乱数で自動生成し、ログに出力された値を控えれば再現できます。
# seed = 42

# 最大イテレーション数（試行回数）
max_iter = 50000

# 改善が止まってから再起動するまでのイテレーション数（0で再起動を無効化）
restart_after = 3000

# 再起動の最大回数
max_restarts = 10

# タブーリスト長（テニュア）。L1内 / L2内 / 層間スワップで個別に設定。
# 層間は影響が大きいため長めにします。
tabu_l1 = 15
tabu_l2 = 15
tabu_inter = 25

# 層間スワップ候補のサンプリング数（大きいほど高品質・低速）
inter_sample = 80

# 同レイヤー内スワップで全ペアを列挙する上限（超えるとランダムサンプリングに切替）
ab_sample_limit = 200

# 進捗ログの出力間隔（イテレーション数。0で無効）
log_interval = 1000

# 再起動時に行うランダム層間スワップ回数（大きいほど局所解を抜けやすいが初期品質は下がる）
perturbation_swaps = 8

# ── 可動テニュア（改善が停滞したらタブー長を自動で広げる）─────────────
# 改善停止から「restart_after × この割合」を超えると拡大を開始
tenure_grow_threshold = 0.5
# 拡大のインターバル（イテレーション数）。再起動直前に上限へ達するよう自動調整します。
tenure_grow_interval = 200
# テニュア上限の倍率（初期値 × この値が上限。例: tabu_l1=15 × 3.0 → 45）
tenure_max_scale = 3.0


# ══════════════════════════════════════
# [weights] 評価の重み
#
# スコアは小さいほど良い配列。ペナルティは加算、ボーナスは減算されます。
# ══════════════════════════════════════
[weights]

# 打鍵数コストのスケール係数。
# 「L1とL2どちらに置くか」を最優先にするため、他の評価より十分大きくします。
stroke_scale = 10.0

# ── ペナルティ（大きいほど避ける）──────────────────────────────
# 同じ物理キーの連続打鍵（L1連続、またはL2→同キーL1）
same_key_penalty = 8.0
# 同じ指で別キーを連続（例: か行→た行を中指だけで）
same_finger_penalty = 5.0
# 同手で上下段を跨ぐ打鍵（row差2）
upper_lower_jump = 1.5
# 同手・異指の基礎コスト（ロール系ボーナスはここから差し引かれる）
same_hand_base = 0.2

# ── ボーナス（大きいほど優遇）──────────────────────────────────
# 左右交互打鍵
alternation_bonus = 0.6

# バイグラムのロール（小指側=アウトロール / 人差し指側=インロール）
#   左手は列が減る方向、右手は列が増える方向がアウトロール
outroll_bonus_2gram = 0.4
inroll_bonus_2gram = 0.15

# トライグラムの準交互打鍵（LLR/RRL/LRR/RLL を「2打で1アクションの交互打鍵」とみなす）
quasi_alt_bonus = 0.1

# トライグラムのアルペジオ（同手3連続で列が単調に動く）
#   アウトロール=小指方向（左 2→1→0 / 右 5→6→7）、インロール=人差し指方向
outroll_bonus_3gram = 0.3
inroll_bonus_3gram = 0.1


# ══════════════════════════════════════
# [slot_difficulty] スロット難易度
#
# 各行を配列で指定（3x10は10要素、3x11は11要素）。値が小さいほど打ちやすい。
# 列: [左小, 左薬, 左中, 左人, 左人, 右人, 右人, 右中, 右薬, 右小, 右小(追加列)]
# ══════════════════════════════════════
[slot_difficulty]

#         左小    左薬    左中    左人    左人    右人    右人    右中    右薬    右小   右小(追加)
row0 = [  1.8,    1.4,    1.2,    1.1,    1.4,    1.4,    1.1,    1.2,    1.4,    1.8,    2.0  ]  # 上段(Qキー行)
row1 = [  1.3,    1.0,    0.9,    0.9,    1.1,    1.1,    0.9,    0.9,    1.0,    1.3,    1.6  ]  # 中段(Aキー行)
row2 = [  1.9,    1.5,    1.3,    1.2,    1.6,    1.6,    1.2,    1.3,    1.5,    1.9,    2.2  ]  # 下段(Zキー行)


# ══════════════════════════════════════
# [constraints] 配置制約（すべて省略可）
# ══════════════════════════════════════
# l1_only: Layer 1 に固定する文字（L1内の移動は可）。省略時は "゛゜"。"" で全文字を層間移動可に。
#
# preset: 排他配置ペアを自動生成し、対象文字がL2にあるとき直後のシフト打鍵を -1打鍵する評価ボーナスも有効化。
#   all-daku: 全濁音基音（うかきくけこさしすせそたちつてとはひふへほ）＋゛を相互排他
#   i-daku:   イ段濁音基音（きしちひ）× 全濁音基音＋゛を排他
#
# [constraints]
# l1_only = "゛゜"
# preset = "i-daku"
#
# ── [[constraints.exclusive_pairs]] 排他配置ペア（複数可）────────────
# 同じ物理キーのL1とL2に group_a と group_b の文字を同居させない（対称）。
# 例: 拗音（ゃゅょ）と、それを作る基音（きしちにひみり）を同じキーのL1/L2に置かない。
#
# [[constraints.exclusive_pairs]]
# group_a = "ゃゅょ"
# group_b = "きしちにひみり"
